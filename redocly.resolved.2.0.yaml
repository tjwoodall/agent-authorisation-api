openapi: 3.0.3
info:
  title: Agent Authorisation
  version: '2.0'
  description: |-

    # Overview
    You can find more information about this API in the [agent-authorisation-api](https://github.com/hmrc/agent-authorisation-api/blob/main/README.md) GitHub repository.
    # Changelog
    You can find the changelog in the [agent-authorisation-api](https://github.com/hmrc/agent-authorisation-api/blob/main/CHANGE_LOG.md) GitHub repository.
servers:
  - url: https://test-api.service.hmrc.gov.uk/
    description: Sandbox
  - url: https://api.service.hmrc.gov.uk/
    description: Production
tags:
  - name: Agents
    description: ''
paths:
  /agents/{arn}/invitations:
    post:
      tags:
        - Agents
      summary: Create a new authorisation
      description: Create a new authorisation request. The request will expire after 21 days.
      operationId: Createanewauthorisation
      security:
        - userRestricted:
            - write:sent-invitations
      parameters:
        - name: arn
          in: path
          description: The Making Tax Digital (MTD) platform Agent Reference Number. For format and validation of Agent Reference Number [See here](https://github.com/hmrc/agent-authorisation-api/tree/main/app/uk/gov/hmrc/agentauthorisation/models/Arn.scala)
          required: true
          style: simple
          schema: &ref_2
            type: string
            example: AARN9999999
        - name: Accept
          in: header
          description: Specifies the response format and the [version](/api-documentation/docs/reference-guide#versioning) of the API to be used.
          required: true
          schema: &ref_3
            type: string
            enum:
              - application/vnd.hmrc.2.0+json
        - name: Content-Type
          in: header
          description: The media type of the request body.
          schema: &ref_13
            type: string
            enum:
              - application/json
          required: true
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - title: Agent Invitation Request for MTD-IT
                  required: &ref_23
                    - service
                    - clientType
                    - clientIdType
                    - clientId
                    - knownFact
                  type: object
                  properties: &ref_24
                    service:
                      allOf:
                        - title: MTD-IT
                          type: string
                          description: MTD IT service
                    clientType:
                      allOf:
                        - title: personal
                          type: string
                          description: An individual or sole trader
                    clientIdType:
                      allOf:
                        - title: ni
                          type: string
                    clientId:
                      allOf:
                        - title: National Insurance Number
                          type: string
                          pattern: ^[ABCEGHJKLMNOPRSTWXYZ][ABCEGHJKLMNPRSTWXYZ]?\d{2}?\d{2}?\d{2}?[A-D]{1}$
                    knownFact:
                      allOf:
                        - title: Postcode
                          type: string
                          pattern: ^[A-Z]{1,2}[0-9][0-9A-Z]?\s?[0-9][A-Z]{2}$|BFPO\s?[0-9]{1,5}$
                    agentType:
                      allOf:
                        - title: Agent type
                          nullable: true
                          type: string
                          enum: &ref_4
                            - main
                            - supporting
                          description: Only MTD-IT supports this field. Defaults to "main" if omitted.
                - title: Agent Invitation Request for VAT
                  required: &ref_25
                    - service
                    - clientType
                    - clientIdType
                    - clientId
                    - knownFact
                  type: object
                  properties: &ref_26
                    service:
                      allOf:
                        - title: MTD-VAT
                          type: string
                          description: MTD VAT service
                    clientType:
                      oneOf:
                        - title: personal
                          type: string
                          description: An individual or sole trader
                        - title: business
                          type: string
                          description: A company or partnership
                    clientIdType:
                      allOf:
                        - title: vrn
                          type: string
                    clientId:
                      allOf:
                        - title: VAT Registration Number
                          type: string
                          pattern: ^[0-9]{1,9}$
                    knownFact:
                      allOf:
                        - title: VAT registration date
                          type: string
                          pattern: yyyy-mm-dd
            examples:
              example-ITSA:
                value:
                  $ref: ./examples/post-agency-invitations-itsa-example.json
              example-ITSA-main:
                value:
                  $ref: ./examples/post-agency-invitations-itsa-main-example.json
              example-ITSA-supporting:
                value:
                  $ref: ./examples/post-agency-invitations-itsa-supp-example.json
              example-VAT:
                value:
                  $ref: ./examples/post-agency-invitations-vat-example.json
        required: true
      responses:
        '204':
          description: The request was accepted and an authorisation request has been created
          headers:
            Location:
              description: Location of the authorisation request.
              schema:
                type: string
                example: /agents/AARN9999999/invitations/CS5AK7O8FPC43
        '400':
          description: Bad Request
          content: &ref_22
            application/json:
              schema:
                type: object
                properties: &ref_0
                  code:
                    type: string
                  message:
                    type: string
                required: &ref_1
                  - code
                  - message
              examples:
                serviceNotSupported:
                  value:
                    $ref: ./examples/errors/badReq_serviceNotSupported.json
                invalidClientType:
                  value:
                    $ref: ./examples/errors/badReq_clientTypeNotSupported.json
                invalidClientId:
                  value:
                    $ref: ./examples/errors/badReq_clientIdFormatInvalid.json
                clientIdDoesNotMatchService:
                  value:
                    $ref: ./examples/errors/badReq_clientIdServiceMatchError.json
                invalidPostcode:
                  value:
                    $ref: ./examples/errors/badReq_postcodeFormatInvalid.json
                invalidVatRegistrationDate:
                  value:
                    $ref: ./examples/errors/badReq_vatRegDateFormatInvalid.json
                unsupportedVersion:
                  value:
                    $ref: ./examples/errors/badReq_invalidVersionAcceptHeader.json
                unsupportedContentType:
                  value:
                    $ref: ./examples/errors/badReq_unsupportedContentType.json
                unsupportedAgentType:
                  value:
                    $ref: ./examples/errors/badReq_unsupportedAgentType.json
                badRequest:
                  value:
                    $ref: ./examples/errors/badReq.json
        '401':
          description: Unauthorized
          content: &ref_5
            application/json:
              schema:
                type: object
                properties: *ref_0
                required: *ref_1
              examples:
                unauthorizedRequest:
                  value:
                    code: UNAUTHORIZED
                    message: Bearer token is missing or not authorized.
        '403':
          description: Forbidden
          headers: &ref_18
            Location:
              description: Location of the authorisation request. (Only returned with duplicateAuthorisationRequest)
              schema:
                type: string
                example: /agents/AARN9999999/invitations/CS5AK7O8FPC43
          content: &ref_19
            application/json:
              schema:
                type: object
                properties: *ref_0
                required: *ref_1
              examples:
                clientRegistrationNotFound:
                  value:
                    $ref: ./examples/errors/forbidden_clientRegNotFound.json
                postcodeNoMatch:
                  value:
                    $ref: ./examples/errors/forbidden_postcodeNoMatch.json
                vatRegistrationDateNoMatch:
                  value:
                    $ref: ./examples/errors/forbidden_vatRegDateNoMatch.json
                duplicateAuthorisationRequest:
                  value:
                    $ref: ./examples/errors/forbidden_duplicateAuthReq.json
                alreadyAuthorised:
                  value:
                    $ref: ./examples/errors/forbidden_alreadyAuthorised.json
                notAnAgent:
                  value:
                    $ref: ./examples/errors/forbidden_notAgent.json
                agentNotSubscribed:
                  value:
                    $ref: ./examples/errors/forbidden_agentNotSubscribed.json
                noPermissionOnAgency:
                  value:
                    $ref: ./examples/errors/forbidden_noPermissionOnAgency.json
                vatClientInsolvent:
                  value:
                    $ref: ./examples/errors/forbidden_vatClientInsolvent.json
                alreadyProcessing:
                  value:
                    $ref: ./examples/errors/forbidden_alreadyProcessing.json
        '406':
          description: Not Acceptable
          content: &ref_6
            application/json:
              schema:
                type: object
                properties: *ref_0
                required: *ref_1
              examples:
                acceptHeaderMissing:
                  value:
                    $ref: ./examples/errors/notAcceptable_headerMissing.json
                acceptHeaderInvalid:
                  value:
                    $ref: ./examples/errors/notAcceptable_headerInvalid.json
        '500':
          description: Internal Server Error
          content: &ref_7
            application/json:
              schema:
                type: object
                properties: *ref_0
                required: *ref_1
              examples:
                internalServerErrorExample:
                  value:
                    $ref: ./examples/errors/internalServerError.json
      deprecated: false
    get:
      tags:
        - Agents
      summary: Get all authorisation requests for the last 30 days
      operationId: Getallauthorisationrequestsforthelast30days
      security:
        - userRestricted:
            - read:sent-invitations
      parameters:
        - name: arn
          in: path
          description: The Making Tax Digital (MTD) platform Agent Reference Number. For format and validation of Agent Reference Number [See here](https://github.com/hmrc/agent-authorisation-api/tree/main/app/uk/gov/hmrc/agentauthorisation/models/Arn.scala)
          required: true
          style: simple
          schema: *ref_2
        - name: Accept
          in: header
          description: Specifies the response format and the [version](/api-documentation/docs/reference-guide#versioning) of the API to be used.
          required: true
          schema: *ref_3
      responses:
        '200':
          description: A list of authorisation requests
          content:
            application/json:
              schema:
                type: array
                items:
                  title: AgentsInvitationsResponse
                  required: &ref_8
                    - _links
                    - service
                    - arn
                    - created
                    - status
                  type: object
                  properties: &ref_9
                    _links:
                      allOf:
                        - title: Links
                          required: &ref_35
                            - self
                          type: object
                          properties: &ref_36
                            self:
                              allOf:
                                - title: Self
                                  required:
                                    - href
                                  type: object
                                  properties:
                                    href:
                                      type: string
                                  description: A link to the current resource.
                          description: A link to the current resource.
                        - description: The link to the invitation
                    service:
                      maxItems: 1
                      type: array
                      items:
                        oneOf:
                          - title: MTD-IT
                            type: string
                            description: MTD IT service
                          - title: MTD-VAT
                            type: string
                            description: MTD VAT service
                      description: The service to which this invitation refers
                    arn:
                      type: string
                      description: The Agent Registration Number for the calling agency
                    created:
                      type: string
                      description: Creation time of the request (RFC3339 / ISO8601 format)
                      format: date-time
                    updated:
                      type: string
                      description: Update time of the request (RFC3339 / ISO8601 format)
                      format: date-time
                    expiresOn:
                      type: string
                      description: Expiration time of the request (RFC3339 / ISO8601 format)
                      format: date
                    status:
                      type: string
                      enum:
                        - Pending
                        - Accepted
                        - Rejected
                        - Cancelled
                        - Deauthorised
                        - Expired
                        - Partialauth
                      description: The current status of the invitation
                    clientActionUrl:
                      type: string
                      description: Link for the client to authorise/reject this agent's invitation.
                      format: uri
                    agentType:
                      allOf:
                        - title: Agent type
                          nullable: true
                          type: string
                          enum: *ref_4
                          description: Only MTD-IT supports this field. Defaults to "main" if omitted.
                description: Returns all authorisation requests for the last 30 days.
              examples:
                pending and responded:
                  value:
                    $ref: ./examples/get-agency-invitations-example.json
        '204':
          description: The agent has no authorisation requests in the last 30 days
        '400':
          description: Bad Request
          content: &ref_10
            application/json:
              schema:
                type: object
                properties: *ref_0
                required: *ref_1
              examples:
                unsupportedVersion:
                  value:
                    $ref: ./examples/errors/badReq_invalidVersionAcceptHeader.json
                badRequest:
                  value:
                    $ref: ./examples/errors/badReq.json
        '401':
          description: Unauthorized
          content: *ref_5
        '403':
          description: Forbidden
          content: &ref_11
            application/json:
              schema:
                type: object
                properties: *ref_0
                required: *ref_1
              examples:
                notAnAgent:
                  value:
                    $ref: ./examples/errors/forbidden_notAgent.json
                agentNotSubscribed:
                  value:
                    $ref: ./examples/errors/forbidden_agentNotSubscribed.json
                noPermissionOnAgency:
                  value:
                    $ref: ./examples/errors/forbidden_noPermissionOnAgency.json
        '406':
          description: Not Acceptable
          content: *ref_6
        '500':
          description: Internal Server Error
          content: *ref_7
      deprecated: false
  /agents/{arn}/invitations/{invitationId}:
    get:
      tags:
        - Agents
      summary: Get an invitation by id
      operationId: Getaninvitationbyid
      security:
        - userRestricted:
            - read:sent-invitations
      parameters:
        - name: arn
          in: path
          description: The Making Tax Digital (MTD) platform Agent Reference Number. For format and validation of Agent Reference Number [See here](https://github.com/hmrc/agent-authorisation-api/tree/main/app/uk/gov/hmrc/agentauthorisation/models/Arn.scala)
          required: true
          style: simple
          schema: *ref_2
        - name: invitationId
          in: path
          description: A unique authorisation request ID
          required: true
          style: simple
          schema: &ref_12
            type: string
            example: CS5AK7O8FPC43
        - name: Accept
          in: header
          description: Specifies the response format and the [version](/api-documentation/docs/reference-guide#versioning) of the API to be used.
          required: true
          schema: *ref_3
      responses:
        '200':
          description: The authorisation request
          content:
            application/json:
              schema:
                title: AgentsInvitationsResponse
                required: *ref_8
                type: object
                properties: *ref_9
              examples:
                pending:
                  value:
                    $ref: ./examples/get-agency-invitation-pending-example.json
                responded:
                  value:
                    $ref: ./examples/get-agency-invitation-responded-example.json
        '400':
          description: Bad Request
          content: *ref_10
        '401':
          description: Unauthorized
          content: *ref_5
        '403':
          description: Forbidden
          content: *ref_11
        '404':
          description: Not Found
          content: &ref_14
            application/json:
              schema:
                type: object
                properties: *ref_0
                required: *ref_1
              examples:
                invitationNotFound:
                  value:
                    code: INVITATION_NOT_FOUND
                    message: The authorisation request cannot be found.
        '406':
          description: Not Acceptable
          content: *ref_6
        '500':
          description: Internal Server Error
          content: *ref_7
      deprecated: false
    delete:
      tags:
        - Agents
      summary: Cancel an invitation by id
      operationId: Cancelaninvitationbyid
      security:
        - userRestricted:
            - write:cancel-invitations
      parameters:
        - name: arn
          in: path
          description: The Making Tax Digital (MTD) platform Agent Reference Number. For format and validation of Agent Reference Number [See here](https://github.com/hmrc/agent-authorisation-api/tree/main/app/uk/gov/hmrc/agentauthorisation/models/Arn.scala)
          required: true
          style: simple
          schema: *ref_2
        - name: invitationId
          in: path
          description: A unique authorisation request ID
          required: true
          style: simple
          schema: *ref_12
        - name: Accept
          in: header
          description: Specifies the response format and the [version](/api-documentation/docs/reference-guide#versioning) of the API to be used.
          required: true
          schema: *ref_3
        - name: Content-Type
          in: header
          description: The media type of the request body.
          schema: *ref_13
          required: true
      responses:
        '204':
          description: The authorisation request has been cancelled
        '400':
          description: Bad Request
          content: &ref_21
            application/json:
              schema:
                type: object
                properties: *ref_0
                required: *ref_1
              examples:
                unsupportedVersion:
                  value:
                    $ref: ./examples/errors/badReq_invalidVersionAcceptHeader.json
                badRequest:
                  value:
                    $ref: ./examples/errors/badReq.json
        '401':
          description: Unauthorized
          content: *ref_5
        '403':
          description: Forbidden
          content: &ref_17
            application/json:
              schema:
                type: object
                properties: *ref_0
                required: *ref_1
              examples:
                invalidInvitationStatus:
                  value:
                    $ref: ./examples/errors/forbidden_invalidInvitationStatus.json
                notAnAgent:
                  value:
                    $ref: ./examples/errors/forbidden_notAgent.json
                agentNotSubscribed:
                  value:
                    $ref: ./examples/errors/forbidden_agentNotSubscribed.json
                noPermissionOnAgency:
                  value:
                    $ref: ./examples/errors/forbidden_noPermissionOnAgency.json
        '404':
          description: Not Found
          content: *ref_14
        '406':
          description: Not Acceptable
          content: *ref_6
        '500':
          description: Internal Server Error
          content: *ref_7
      deprecated: false
  /agents/{arn}/relationships:
    post:
      tags:
        - Agents
      summary: Get Status of a Relationship
      operationId: GetStatusofaRelationship
      security:
        - userRestricted:
            - read:check-relationship
      parameters:
        - name: arn
          in: path
          description: The Making Tax Digital (MTD) platform Agent Reference Number. For format and validation of Agent Reference Number [See here](https://github.com/hmrc/agent-authorisation-api/tree/main/app/uk/gov/hmrc/agentauthorisation/models/Arn.scala)
          required: true
          style: simple
          schema: *ref_2
        - name: Accept
          in: header
          description: Specifies the response format and the [version](/api-documentation/docs/reference-guide#versioning) of the API to be used.
          required: true
          schema: *ref_3
        - name: Content-Type
          in: header
          description: The media type of the request body.
          schema: *ref_13
          required: true
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - title: Check Status of Relationship Request for MTD-VAT
                  required: &ref_31
                    - service
                    - clientIdType
                    - clientId
                    - knownFact
                  type: object
                  properties: &ref_32
                    service:
                      allOf:
                        - title: MTD-VAT
                          type: string
                          description: MTD VAT service
                    clientIdType:
                      allOf:
                        - title: vrn
                          type: string
                    clientId:
                      allOf:
                        - title: VAT Registration Number
                          type: string
                          pattern: ^[0-9]{1,9}$
                    knownFact:
                      allOf:
                        - title: VAT registration date
                          type: string
                          pattern: yyyy-mm-dd
                - title: Check Status of Relationship Request for MTD-IT
                  required: &ref_33
                    - service
                    - clientIdType
                    - clientId
                    - knownFact
                  type: object
                  properties: &ref_34
                    service:
                      allOf:
                        - title: MTD-IT
                          type: string
                          description: MTD IT service
                    clientIdType:
                      allOf:
                        - title: ni
                          type: string
                    clientId:
                      allOf:
                        - title: National Insurance Number
                          type: string
                          pattern: ^[ABCEGHJKLMNOPRSTWXYZ][ABCEGHJKLMNPRSTWXYZ]?\d{2}?\d{2}?\d{2}?[A-D]{1}$
                    knownFact:
                      allOf:
                        - title: Postcode
                          type: string
                          pattern: ^[A-Z]{1,2}[0-9][0-9A-Z]?\s?[0-9][A-Z]{2}$|BFPO\s?[0-9]{1,5}$
                    agentType:
                      allOf:
                        - title: Agent type
                          nullable: true
                          type: string
                          enum: *ref_4
                          description: Only MTD-IT supports this field. Defaults to "main" if omitted.
            examples:
              example-ITSA:
                value:
                  $ref: ./examples/post-agency-check-relationship-itsa-example.json
              example-ITSA-main:
                value:
                  $ref: ./examples/post-agency-check-relationship-itsa-main-example.json
              example-ITSA-supporting:
                value:
                  $ref: ./examples/post-agency-check-relationship-itsa-supp-example.json
              example-VAT:
                value:
                  $ref: ./examples/post-agency-check-relationship-vat-example.json
        required: true
      responses:
        '204':
          description: The agent is authorised to act for the client.
        '400':
          description: Bad Request
          content: &ref_15
            application/json:
              schema:
                type: object
                properties: *ref_0
                required: *ref_1
              examples:
                serviceNotSupported:
                  value:
                    $ref: ./examples/errors/badReq_serviceNotSupported.json
                invalidClientId:
                  value:
                    $ref: ./examples/errors/badReq_clientIdFormatInvalid.json
                clientIdDoesNotMatchService:
                  value:
                    $ref: ./examples/errors/badReq_clientIdServiceMatchError.json
                invalidPostcode:
                  value:
                    $ref: ./examples/errors/badReq_postcodeFormatInvalid.json
                invalidVatRegistrationDate:
                  value:
                    $ref: ./examples/errors/badReq_vatRegDateFormatInvalid.json
                unsupportedVersion:
                  value:
                    $ref: ./examples/errors/badReq_invalidVersionAcceptHeader.json
                unsupportedContentType:
                  value:
                    $ref: ./examples/errors/badReq_unsupportedContentType.json
                unsupportedAgentType:
                  value:
                    $ref: ./examples/errors/badReq_unsupportedAgentType.json
                badRequest:
                  value:
                    $ref: ./examples/errors/badReq.json
        '401':
          description: Unauthorized
          content: *ref_5
        '403':
          description: Forbidden
          content: &ref_20
            application/json:
              schema:
                type: object
                properties: *ref_0
                required: *ref_1
              examples:
                clientRegistrationNotFound:
                  value:
                    $ref: ./examples/errors/forbidden_clientRegNotFound.json
                postcodeNoMatch:
                  value:
                    $ref: ./examples/errors/forbidden_postcodeNoMatch.json
                vatRegistrationDateNoMatch:
                  value:
                    $ref: ./examples/errors/forbidden_vatRegDateNoMatch.json
                notAnAgent:
                  value:
                    $ref: ./examples/errors/forbidden_notAgent.json
                agentNotSubscribed:
                  value:
                    $ref: ./examples/errors/forbidden_agentNotSubscribed.json
                noPermissionOnAgency:
                  value:
                    $ref: ./examples/errors/forbidden_noPermissionOnAgency.json
                vatClientInsolvent:
                  value:
                    $ref: ./examples/errors/forbidden_vatClientInsolvent.json
        '404':
          description: Not Found
          content: &ref_16
            application/json:
              schema:
                type: object
                properties: *ref_0
                required: *ref_1
              examples:
                relationshipNotFound:
                  value:
                    code: RELATIONSHIP_NOT_FOUND
                    message: Relationship is inactive. Agent is not authorised to act for this client.
        '406':
          description: Not Acceptable
          content: *ref_6
        '500':
          description: Internal Server Error
          content: *ref_7
      deprecated: false
  /agents/{arn}/deauthorise-client:
    put:
      tags:
        - Agents
      summary: De-authorise an existing client relationship
      operationId: DeauthoriseClient
      security:
        - userRestricted:
            - write:relationships
      parameters:
        - name: arn
          in: path
          description: The Making Tax Digital (MTD) platform Agent Reference Number. For format and validation of Agent Reference Number [See here](https://github.com/hmrc/agent-authorisation-api/tree/main/app/uk/gov/hmrc/agentauthorisation/models/Arn.scala)
          required: true
          style: simple
          schema: *ref_2
        - name: Accept
          in: header
          description: Specifies the response format and the [version](/api-documentation/docs/reference-guide#versioning) of the API to be used.
          required: true
          schema: *ref_3
        - name: Content-Type
          in: header
          description: The media type of the request body.
          schema: *ref_13
          required: true
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - title: De-authorise client request for MTD-IT
                  required: &ref_27
                    - service
                    - clientType
                    - clientIdType
                    - clientId
                  type: object
                  properties: &ref_28
                    service:
                      allOf:
                        - title: MTD-IT
                          type: string
                          description: MTD IT service
                    clientType:
                      allOf:
                        - title: personal
                          type: string
                          description: An individual or sole trader
                    clientIdType:
                      allOf:
                        - title: ni
                          type: string
                    clientId:
                      allOf:
                        - title: National Insurance Number
                          type: string
                          pattern: ^[ABCEGHJKLMNOPRSTWXYZ][ABCEGHJKLMNPRSTWXYZ]?\d{2}?\d{2}?\d{2}?[A-D]{1}$
                    agentType:
                      allOf:
                        - title: Agent type
                          nullable: true
                          type: string
                          enum: *ref_4
                          description: Only MTD-IT supports this field. Defaults to "main" if omitted.
                - title: De-authorise client request for MTD-VAT
                  required: &ref_29
